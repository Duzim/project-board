<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; font-src {{cspSource}}; script-src 'nonce-{{nonce}}';">
    <link rel="stylesheet" href="{{cssUri}}">
    <link rel="stylesheet" href="{{codiconUri}}">
</head>

<body>
    <header>
        <h1>Project Board</h1>
        <div class="actions">
            <button data-action="add-group" class="secondary">+ Group</button>
            <button data-action="add-project">+ Project</button>
        </div>
    </header>
    <main id="board">{{dashboard}}</main>
    <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>

</html>
